name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Weekly run (readiness review S6 / Task 3.7): catches newly published
  # RUSTSEC advisories and newly stabilized clippy/rustc lints (CI pins
  # `stable` to a branch ref, see the NOTE below, so `-D warnings` only ever
  # breaks on the next push otherwise) proactively instead of on the next
  # unrelated push.
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # NOTE: pinning the `stable` branch ref freezes the toolchain channel
      # to whatever "stable" resolved to on the pin date, rather than
      # tracking the rolling `stable` channel. Task 3.7 owns the
      # MSRV/toolchain-version decision; this pin is supply-chain hygiene
      # only, not a toolchain policy change.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable (branch)
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --locked --workspace --no-fail-fast

      - name: cargo build --release
        run: cargo build --locked --release

      - name: Upload release binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ironlint-${{ matrix.os }}
          path: target/release/ironlint
          retention-days: 1

      # The claude-code and codex adapter contract tests are Rust
      # integration tests — crates/ironlint-cli/tests/hook_contract_claude_code.rs
      # and hook_contract_codex.rs — that run as part of `cargo test
      # --workspace` above. Each spawns `bash adapters/<harness>/hooks/hook.sh`
      # with a stub `ironlint` on PATH (not the just-built binary — the stub's
      # exit code drives the case under test) against every exit-code branch
      # (0/2/3/4 + malformed input); jq/python3/bash are present on the runners.
      - name: IronLint dogfood (.ironlint.yml on own source)
        if: hashFiles('.ironlint.yml') != ''
        run: PATH="$(pwd)/target/release:${PATH}" bash scripts/ci-dogfood.sh

  # Windows CI leg (readiness review C2 / Task 3.7): proves the workspace
  # *compiles* for Windows — it does not run `cargo test`. ironlint's
  # execution model (`engine::gate::run_gate`) spawns a POSIX `sh -c` and,
  # on unix, manages process groups via the `nix` crate (now scoped to
  # `[target.'cfg(unix)'.dependencies]` in ironlint-core's Cargo.toml); most
  # gate tests assume a POSIX shell and are not Windows-safe. A native
  # Windows execution path (readiness review Task 1.4 — fail loud when `sh`
  # is missing) has not been implemented yet, so this leg is compile-only
  # until that lands.
  windows:
    name: windows (compile only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # NOTE: pinning the `stable` branch ref freezes the toolchain channel
      # to whatever "stable" resolved to on the pin date, rather than
      # tracking the rolling `stable` channel. Task 3.7 owns the
      # MSRV/toolchain-version decision; this pin is supply-chain hygiene
      # only, not a toolchain policy change.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable (branch)

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: windows

      - name: cargo build --locked (compile only)
        run: cargo build --locked --workspace

  coverage:
    name: coverage gate (≥80% per file)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # NOTE: pinning the `stable` branch ref freezes the toolchain channel
      # to whatever "stable" resolved to on the pin date, rather than
      # tracking the rolling `stable` channel. Task 3.7 owns the
      # MSRV/toolchain-version decision; this pin is supply-chain hygiene
      # only, not a toolchain policy change.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable (branch)
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: coverage

      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419  # v2.82.7
        with:
          tool: cargo-llvm-cov

      - name: Per-file coverage gate
        run: bash scripts/ci-coverage.sh

  # Supply-chain audit (readiness review S6 / Task 3.7): fails the build on
  # a known RUSTSEC advisory, a disallowed license, or a banned/duplicate
  # crate policy violation. Config: deny.toml at the repo root.
  deny:
    name: cargo-deny (advisories, licenses, bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2.0.20
        with:
          # The action defaults `arguments` to `--all-features`; override it
          # to match what's verified locally (`cargo deny check advisories
          # licenses bans`, no `--all-features` — deny.toml's [graph] section
          # intentionally checks the workspace as it actually ships).
          arguments: ""
          command: check
          command-arguments: "advisories licenses bans"

  # MSRV enforcement (readiness review S6 / Task 3.7): builds and tests on
  # exactly the floor declared in `[workspace.package] rust-version` so a
  # `cargo install`-from-source break is CI-caught, not user-discovered.
  # 1.87 is the real floor: gate.rs uses `u32::cast_signed()`, stabilized in
  # that release. Verified locally: `cargo +1.87.0 build --locked --workspace`.
  msrv:
    name: msrv (1.87)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable (branch)
        with:
          toolchain: "1.87"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: msrv

      - name: cargo build --locked (MSRV)
        run: cargo build --locked --workspace

      - name: cargo test --locked (MSRV)
        run: cargo test --locked --workspace --no-fail-fast

  opencode-adapter:
    name: opencode adapter
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ironlint-ubuntu-latest
          path: target/release

      - run: chmod +x target/release/ironlint

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - name: Install plugin dev deps
        working-directory: adapters/opencode
        run: bun install --frozen-lockfile

      - name: TypeScript type-check
        working-directory: adapters/opencode
        run: bunx tsc --noEmit

      - name: Plugin integration test
        run: PATH="$(pwd)/target/release:${PATH}" bun test adapters/opencode/tests/plugin.test.ts

  pi-adapter:
    name: pi adapter
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ironlint-ubuntu-latest
          path: target/release

      - run: chmod +x target/release/ironlint

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"

      - name: Install dev deps
        working-directory: adapters/pi
        run: npm ci

      - name: TypeScript type-check
        working-directory: adapters/pi
        run: npx tsc --noEmit

      - name: Extension integration test
        run: PATH="$(pwd)/target/release:${PATH}" node --experimental-strip-types --test adapters/pi/test/*.test.ts
