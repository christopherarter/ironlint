name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # NOTE: pinning the `stable` branch ref freezes the toolchain channel
      # to whatever "stable" resolved to on the pin date, rather than
      # tracking the rolling `stable` channel. Task 3.7 owns the
      # MSRV/toolchain-version decision; this pin is supply-chain hygiene
      # only, not a toolchain policy change.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable (branch)
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

      - name: cargo build --release
        run: cargo build --release

      - name: Upload release binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ironlint-${{ matrix.os }}
          path: target/release/ironlint
          retention-days: 1

      # The claude-code and reasonix adapter contract tests are Rust
      # integration tests under crates/ironlint-cli/tests/ — they run as part of
      # `cargo test --workspace` above (they spawn the adapter hook.sh against
      # the just-built binary; jq/python3/bash are present on the runners).
      - name: IronLint dogfood (.ironlint.yml on own source)
        if: hashFiles('.ironlint.yml') != ''
        run: PATH="$(pwd)/target/release:${PATH}" bash scripts/ci-dogfood.sh

  coverage:
    name: coverage gate (≥80% per file)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # NOTE: pinning the `stable` branch ref freezes the toolchain channel
      # to whatever "stable" resolved to on the pin date, rather than
      # tracking the rolling `stable` channel. Task 3.7 owns the
      # MSRV/toolchain-version decision; this pin is supply-chain hygiene
      # only, not a toolchain policy change.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable (branch)
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: coverage

      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419  # v2.82.7
        with:
          tool: cargo-llvm-cov

      - name: Per-file coverage gate
        run: bash scripts/ci-coverage.sh

  opencode-adapter:
    name: opencode adapter
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ironlint-ubuntu-latest
          path: target/release

      - run: chmod +x target/release/ironlint

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - name: Install plugin dev deps
        working-directory: adapters/opencode
        run: bun install --frozen-lockfile

      - name: TypeScript type-check
        working-directory: adapters/opencode
        run: bunx tsc --noEmit

      - name: Plugin integration test
        run: PATH="$(pwd)/target/release:${PATH}" bun test adapters/opencode/tests/plugin.test.ts

  pi-adapter:
    name: pi adapter
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ironlint-ubuntu-latest
          path: target/release

      - run: chmod +x target/release/ironlint

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"

      - name: Install dev deps
        working-directory: adapters/pi
        run: npm ci

      - name: TypeScript type-check
        working-directory: adapters/pi
        run: npx tsc --noEmit

      - name: Extension integration test
        run: PATH="$(pwd)/target/release:${PATH}" node --experimental-strip-types --test adapters/pi/test/*.test.ts
