[workspace]
resolver = "2"
members = ["crates/hector-core", "crates/hector-cli"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/dynamik-dev/hector"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
anyhow = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
sha2 = "0.10"
globset = "0.4"
nix = { version = "0.29", features = ["mount", "sched", "user"] }
tempfile = "3"
assert_cmd = "2"
predicates = "3"
insta = { version = "1", features = ["yaml", "json"] }
