schema_version: 2

trust:
  fingerprint: "sha256:placeholder"

rules:
  no-console-log:
    description: "No console.log in committed source."
    engine: script
    scope: ["src/**/*.ts"]
    severity: error
    script: "grep -nE 'console\\.log\\(' {file} && exit 1 || exit 0"
    capabilities:
      network: false
      writes: cwd-only

  no-as-any:
    description: "No `as any` casts."
    engine: ast
    scope: "src/**/*.ts"
    severity: error
    pattern: "$EXPR as any"
    language: ts
