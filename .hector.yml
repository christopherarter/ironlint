# Hector's own policy, in the 0.4 checks model. Dogfooded by scripts/ci-dogfood.sh.
#
# Checks have no severity — any nonzero exit (1–125) blocks. The pre-0.3
# `severity: warning` rules (no-unwrap-in-src / no-panic-in-src /
# no-eprintln-debug) are therefore dropped, not downgraded: hector's own
# test-heavy src legitimately uses .unwrap()/panic! in #[cfg(test)] code, so a
# blocking check would be wrong. The three former `severity: error` rules stay as
# blocking checks. The old in-YAML `trust:` block is gone — trust now lives in
# the out-of-repo store (`hector trust`).
checks:
  no-todo-in-src:
    files: crates/*/src/**/*.rs
    run: '! grep -nE "todo!\(" "$HECTOR_FILE"'
  no-unimplemented-in-src:
    files: crates/*/src/**/*.rs
    run: '! grep -nE "unimplemented!\(" "$HECTOR_FILE"'
  no-dbg-in-src:
    files: crates/*/src/**/*.rs
    run: '! grep -nE "dbg!\(" "$HECTOR_FILE"'
